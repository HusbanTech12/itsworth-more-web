<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="iconGradLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="arrowGradLight" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Icon: Diamond with integrated upward-right arrow -->
  <g transform="translate(44, 80)">
    <path d="M 0,-24 L 24,0 L 0,24 L -24,0 Z" fill="#e8edf5"/>
    <path d="M 0,-24 L 24,0 L 0,24 L 0,0 Z" fill="url(#iconGradLight)" opacity="0.6"/>
    <path d="M 0,-24 L 24,0 L 0,0 Z" fill="url(#iconGradLight)"/>
    <path d="M -24,0 L 0,24 L 0,0 Z" fill="#2563eb"/>
    <!-- Arrow integrated in diamond -->
    <path d="M -4,6 L 2,0 L -1,0 L -1,-10 L 9,-10 L 9,-2 L 6,-2 L 11,5 L 6,10 L 3,7 L 3,2 Z" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="96" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#18181b" letter-spacing="-0.02em">Its</text>
  <text x="152" y="96" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#18181b" letter-spacing="-0.02em">Worth</text>
  <text x="310" y="96" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#18181b" letter-spacing="-0.02em">More</text>

  <!-- Tagline -->
  <text x="90" y="126" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#71717a" letter-spacing="0.15em">
    Turn Your Devices Into Opportunity
  </text>
</svg>
